# From https://github.com/trueforge-org/truecharts/blob/master/charts/library/common/values.yaml
# From https://github.com/trueforge-org/truecharts/blob/master/charts/stable/changedetection-io/values.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress-route.yaml

helmCharts:
  - name: changedetection-io
    repo: oci://oci.trueforge.org/truecharts
    releaseName: changedetection-io
    namespace: tools
    version: 5.20.3
    includeCRDs: true
    valuesInline:
      TZ: America/Los_Angeles
      podOptions:
        nodeSelector:
          kubernetes.io/arch: "arm64"
      persistence:
        datastore:
          enabled: true
          mountPath: /datastore
          retain: true
          accessMode: ReadWriteOnce
          size: 8Gi
          storageClass: "ceph-block"
