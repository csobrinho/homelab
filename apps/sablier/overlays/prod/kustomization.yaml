# From https://github.com/sablierapp/helm-charts/blob/main/charts/sablier/values.yaml
# yaml-language-server: $schema=https://www.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

helmCharts:
  - name: sablier
    repo: https://sablierapp.github.io/helm-charts
    releaseName: sablier
    namespace: infra
    version: 1.3.0
    includeCRDs: true
    valuesInline:
      rbac:
        cnpg: true
      resources:
        requests:
          memory: 64Mi
          cpu: 250m
        limits:
          memory: 128Mi
          cpu: 500m
