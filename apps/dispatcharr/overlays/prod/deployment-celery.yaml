apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcharr-celery
  labels:
    app.kubernetes.io/instance: dispatcharr-celery
    app.kubernetes.io/name: dispatcharr-celery
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: dispatcharr-celery
      app.kubernetes.io/name: dispatcharr-celery
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: dispatcharr-celery
        app.kubernetes.io/name: dispatcharr-celery
    spec:
      nodeSelector:
        kubernetes.io/arch: "amd64"
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: dispatcharr
                  app.kubernetes.io/name: dispatcharr
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z cluster-rw.cnpg-system.svc.cluster.local 5432; do echo waiting for postgres; sleep 2; done"]
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z valkey.infra.svc.cluster.local 6379; do echo waiting for valkey; sleep 2; done"]
      containers:
        - name: celery
          image: ghcr.io/dispatcharr/dispatcharr:0.26.0
          command: ["/app/docker/entrypoint.celery.sh"]
          env:
            - name: TZ
              value: America/Los_Angeles
            - name: DISPATCHARR_ENV
              value: "modular"
            - name: DISPATCHARR_PORT
              value: $(DISPATCHARR_SERVICE_PORT)
            - name: POSTGRES_HOST
              value: "cluster-rw.cnpg-system.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "dispatcharr"
            - name: POSTGRES_USER
              value: "dispatcharr"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-secret
                  key: POSTGRES_PASSWORD
            - name: REDIS_HOST
              value: "valkey.infra.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"
            - name: DJANGO_SETTINGS_MODULE
              value: "dispatcharr.settings"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DISPATCHARR_LOG_LEVEL
              value: "info"
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-secret
                  key: SECRET_KEY
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
            limits:
              memory: 2Gi
              cpu: 750m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dispatcharr-data
