# From https://bjw-s-labs.github.io/helm-charts/docs/app-template/reference/explorer/
# yaml-language-server: $schema=https://www.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress-route.yaml

helmCharts:
  - name: app-template
    repo: oci://ghcr.io/bjw-s-labs/helm
    releaseName: bambuddy
    version: 5.0.1
    namespace: tools
    valuesFile: values-empty.yaml
    valuesInline:
      # yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/values.schema.json
      defaultPodOptions:
        nodeSelector:
          kubernetes.io/arch: "arm64"
        securityContext:
          fsGroup: &uid 568
          fsGroupChangePolicy: OnRootMismatch
          supplementalGroups:
            - *uid
      service:
        main:
          controller: main
          ports:
            main:
              port: &port-main 8000
              # 3000          Virtual printer bind/detect
              # 3002          Virtual printer bind/detect
              # 8883          Virtual printer MQTT
              # 990           Virtual printer FTP control
              # 6000          Virtual printer file transfer tunnel
              # 322           Virtual printer RTSP camera (X1/H2/P2; proxy mode + non-proxy modes with a target printer)
              # 2024-2026     Virtual printer proprietary ports (A1/P1S)
              # 50000-50100   Virtual printer FTP passive data
        bambustudio:
          controller: slicers
          ports:
            main:
              port: &port-bs 3001
      controllers:
        main:
          strategy: Recreate
          defaultContainerOptions:
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                add:
                  - NET_BIND_SERVICE
                drop:
                  - ALL
              privileged: false
              readOnlyRootFilesystem: false
              runAsGroup: *uid
              runAsNonRoot: true
              runAsUser: *uid
              seccompProfile:
                type: RuntimeDefault
          containers:
            main:
              image:
                repository: ghcr.io/maziggy/bambuddy
                tag: 0.2.4.9@sha256:d68ab4746f18c51a6e22f5cd536533a4ae3c1eb48f4eecccbb68c2be23d0ef52
                pullPolicy: IfNotPresent
              env:
                TZ: America/Los_Angeles
                PUID: *uid
                PGID: *uid
                PORT: *port-main
                DEBUG: true
                LOG_LEVEL: debug
                HA_URL: https://homeassistant.sobrinho.pt
              probes:
                liveness: &probe-main
                  enabled: true
                  type: HTTP
                  port: *port-main
                  path: /health
                readiness:
                  <<: *probe-main
                startup:
                  <<: *probe-main
              resources:
                limits:
                  memory: 2Gi
                requests:
                  cpu: 200m
                  memory: 512Mi
        slicers:
          strategy: Recreate
          pod:
            nodeSelector:
              kubernetes.io/arch: "amd64"
          defaultContainerOptions:
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              privileged: false
              readOnlyRootFilesystem: false
              runAsGroup: *uid
              runAsNonRoot: true
              runAsUser: *uid
              seccompProfile:
                type: RuntimeDefault
          containers:
            bambustudio:
              image:
                repository: ghcr.io/maziggy/bambu-studio-api
                tag: bambuddy-0.2.4.9@sha256:28816c1373a4e95be315852aa1c6aa689924bb835ab23e5dc1b0cd683609876b
                pullPolicy: IfNotPresent
              env:
                TZ: America/Los_Angeles
                NODE_ENV: development
                PUID: *uid
                PGID: *uid
                PORT: *port-bs
              probes:
                liveness: &probe-bs
                  enabled: true
                  type: HTTP
                  port: *port-bs
                  path: /health
                readiness:
                  <<: *probe-bs
                startup:
                  <<: *probe-bs
              resources:
                limits:
                  memory: 1Gi
                requests:
                  cpu: 200m
                  memory: 512Mi
      persistence:
        data:
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
          size: 10Gi
          storageClass: ceph-block
          retain: true
          advancedMounts:
            main:
              main:
                - path: /app/data
        logs:
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
          size: 512Mi
          storageClass: ceph-block
          retain: true
          advancedMounts:
            main:
              main:
                - path: /app/logs
        data-bambustudio:
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
          size: 4Gi
          storageClass: ceph-block
          retain: true
          advancedMounts:
            slicers:
              bambustudio:
                - path: /app/data
