# From https://bjw-s-labs.github.io/helm-charts/docs/app-template/reference/explorer/
# yaml-language-server: $schema=https://www.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress-route.yaml
  - workers.yaml
  - secrets/esphome-fleet-secret-enc.yaml

helmCharts:
  - name: app-template
    repo: oci://ghcr.io/bjw-s-labs/helm
    releaseName: esphome-fleet
    version: 5.0.1
    namespace: esphome
    valuesFile: values-empty.yaml
    valuesInline:
      # yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/values.schema.json
      defaultPodOptions:
        hostNetwork: true
        securityContext:
          fsGroup: &uid 568
          fsGroupChangePolicy: OnRootMismatch
          supplementalGroups:
            - *uid
      controllers:
        main:
          strategy: Recreate
          defaultContainerOptions:
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              privileged: false
              readOnlyRootFilesystem: false
              runAsGroup: *uid
              runAsNonRoot: true
              runAsUser: *uid
              seccompProfile:
                type: RuntimeDefault
          containers:
            main:
              image:
                repository: ghcr.io/weirded/esphome-dist-server
                tag: 1.7.2@sha256:f4b28522c257e49afd1e7729948d5d8cdae903526a0f4047b6966dd29e526ea2
                pullPolicy: IfNotPresent
              env:
                TZ: America/Los_Angeles
                HA_MODE: standalone
                UV_CACHE_DIR: /data/.cache/.uv
                GIT_CONFIG_PARAMETERS: "'safe.directory=/config/esphome'"
              envFrom:
                - secretRef:
                    name: esphome-fleet-secret
              probes:
                liveness: &probe
                  enabled: true
                  type: HTTP
                  path: /ui/api/server-info
                readiness:
                  <<: *probe
                startup:
                  <<: *probe
      service:
        main:
          controller: main
          ports:
            main:
              port: 8765
      persistence:
        config:
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
          size: 256Mi
          storageClass: ceph-block
          retain: true
          globalMounts:
            - path: /config/esphome
        data:
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
          size: 2Gi
          storageClass: ceph-block
          retain: true
          globalMounts:
            - path: /data
        esphome-versions:
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
          size: 24Gi
          storageClass: ceph-block
          retain: true
          globalMounts:
            - path: /data/esphome-versions
        development:
          type: nfs
          server: infra1
          path: /data/dev/esphome/components
          globalMounts:
            - path: /development/components
