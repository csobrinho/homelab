apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - secrets/supermarket-secret-enc.yaml
  - https://github.com/csobrinho/supermarket-api//prometheus?ref=7205249d1ee50e950859b1f61ba3eef966c769a7

helmCharts:
  - name: supermarket
    releaseName: supermarket
    namespace: tools
    valuesInline:
      image: ghcr.io/csobrinho/supermarket-api:main@sha256:c3a4f023ce302b616909a5e5a0ec5637916029b985a711cd218e0fabc2d0fe72
      users:
        - name: sobry
          schedule: "0 * * * *"
        - name: judy
          schedule: "2 * * * *"

helmGlobals:
  chartHome: helm
