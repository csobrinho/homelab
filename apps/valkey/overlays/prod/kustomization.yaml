# From https://github.com/valkey-io/valkey-helm/blob/main/valkey/values.yaml
# yaml-language-server: $schema=https://www.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

helmCharts:
  - name: valkey
    repo: https://valkey.io/valkey-helm/
    releaseName: valkey
    namespace: infra
    version: 0.10.0
    includeCRDs: true
    valuesInline:
      architecture: standalone # Deploy as a single standalone node (no cluster sharding or replication overhead)
      nodeSelector:
        kubernetes.io/arch: arm64
      resources:
        requests:
          cpu: 100m
          memory: 80Mi
        limits:
          cpu: 350m
          memory: 384Mi
      dataStorage:
        enabled: true
        requestedSize: 2Gi
        className: ceph-block
        keepPvc: true
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
        prometheusRule:
          enabled: true
          rules:
            - alert: ValkeyDown
              annotations:
                summary: Valkey instance {{ "{{ $labels.instance }}" }} down
                description: Valkey instance {{ "{{ $labels.instance }}" }} is down.
              expr: |
                redis_up{service="{{ include "valkey.fullname" . }}-metrics"} == 0
              for: 2m
              labels:
                severity: error
            - alert: ValkeyMemoryHigh
              annotations:
                summary: Valkey instance {{ "{{ $labels.instance }}" }} is using too much memory
                description: |
                  Valkey instance {{ "{{ $labels.instance }}" }} is using {{ "{{ $value }}" }}% of its available memory.
              expr: |
                redis_memory_used_bytes{service="{{ include "valkey.fullname" . }}-metrics"} * 100
                /
                redis_memory_max_bytes{service="{{ include "valkey.fullname" . }}-metrics"}
                > 90 <= 100
              for: 2m
              labels:
                severity: error
            - alert: ValkeyKeyEviction
              annotations:
                summary: Valkey instance {{ "{{ $labels.instance }}" }} has evicted keys
                description: |
                  Valkey instance {{ "{{ $labels.instance }}" }} has evicted {{ "{{ $value }}" }} keys in the last 5 minutes.
              expr: |
                increase(redis_evicted_keys_total{service="{{ include "valkey.fullname" . }}-metrics"}[5m]) > 0
              for: 1s
              labels:
                severity: error
      env:
        TZ: America/Los_Angeles
