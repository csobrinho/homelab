# From https://github.com/trueforge-org/truecharts/blob/master/charts/library/common/values.yaml
# From https://github.com/trueforge-org/truecharts/blob/master/charts/stable/cyberchef/values.yaml
# yaml-language-server: $schema=https://www.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress-route.yaml

helmCharts:
  - name: cyberchef
    repo: oci://oci.trueforge.org/truecharts
    releaseName: cyberchef
    namespace: cyberchef
    version: 13.5.0
    includeCRDs: true
    valuesInline:
      TZ: America/Los_Angeles
      workload:
        main:
          labels:
            sablier.enable: "true"
            sablier.group: cyberchef
      podOptions:
        nodeSelector:
          kubernetes.io/arch: "arm64"

components:
  - ../../../../components/managed-sablier

patches:
  - target:
      kind: Middleware
      name: middleware-sablier
    patch: |-
      - op: replace
        path: /spec/plugin/sablier/group
        value: cyberchef
