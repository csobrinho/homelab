# From https://github.com/trueforge-org/truecharts/blob/master/charts/library/common/values.yaml
# From https://github.com/trueforge-org/truecharts/blob/master/charts/stable/bazarr/values.yaml
# yaml-language-server: $schema=https://www.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress-route.yaml

helmCharts:
  - name: bazarr
    repo: oci://oci.trueforge.org/truecharts
    releaseName: bazarr
    namespace: media
    version: 24.7.0
    includeCRDs: true
    valuesInline:
      TZ: America/Los_Angeles
      persistence:
        config:
          enabled: true
          retain: true
          storageClass: "ceph-block"
          accessMode: ReadWriteOnce
          size: 1Gi
        data:
          enabled: true
          type: nfs
          path: /data
          server: infra1
          mountPath: /data
      resources:
        limits:
          cpu: 500m
          memory: 450Mi
        requests:
          cpu: 100m
          memory: 200Mi
