# yaml-language-server: $schema=https://www.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: rook-ceph

resources:
  - ../../base
  - bucket-etcd.yaml
  - bucket-obdisian.yaml
  - ingress-route.yaml
  - middleware-auth-s3.yaml
  - s3-ingress-route.yaml

helmCharts:
  - name: rook-ceph
    releaseName: rook-ceph
    namespace: rook-ceph
    repo: https://charts.rook.io/release
    version: v1.20.1
    includeCRDs: true
    # From https://github.com/rook/rook/blob/master/deploy/charts/rook-ceph/values.yaml
    valuesInline:
      nodeSelector:
        kubernetes.io/arch: "arm64"
      enableDiscoveryDaemon: true
      serviceMonitor:
        enabled: true
      monitoring:
        enabled: true

  - name: ceph-csi-drivers
    releaseName: ceph-csi-drivers
    namespace: rook-ceph
    repo: https://ceph.github.io/ceph-csi-operator
    version: 1.0.1
    # From https://github.com/ceph/ceph-csi-operator/blob/main/deploy/charts/ceph-csi-drivers/values.yaml
    valuesInline:
      drivers:
        # RBD — block storage.
        rbd:
          enabled: true
          name: "rook-ceph.rbd.csi.ceph.com"
          snapshotPolicy: "volumeSnapshot"
          nodePlugin:
            priorityClassName: system-node-critical
            # No affinity/nodeSelector here — DaemonSet must run on ALL nodes
            # including infra1 (x86) and infra2/infra4 (arm64 workers)
          controllerPlugin:
            replicas: 2 # you have 2 mgr nodes
        # CephFS — filesystem storage.
        cephfs:
          enabled: true
          name: "rook-ceph.cephfs.csi.ceph.com"
          nodePlugin:
            priorityClassName: system-node-critical
          controllerPlugin:
            replicas: 2
        nvmeof:
          enabled: false
        nfs:
          enabled: false

  - name: rook-ceph-cluster
    releaseName: rook-release
    namespace: rook-ceph
    repo: https://charts.rook.io/release
    version: v1.20.1
    includeCRDs: true
    # From https://github.com/rook/rook/blob/master/deploy/charts/rook-ceph-cluster/values.yaml
    valuesInline:
      operatorNamespace: rook-ceph
      toolbox:
        enabled: true
      monitoring:
        enabled: true
        createPrometheusRules: true
      cephImage:
        imagePullPolicy: IfNotPresent
      cephClusterSpec:
        mgr:
          count: 2
          allowMultiplePerNode: false
          modules:
            - name: rook
              enabled: true
        removeOSDsIfOutAndSafeToRemove: true
        storage:
          useAllNodes: false
          useAllDevices: false
          deviceFilter: "^(sd[a-z]|nvme[0-9]n[0-9])$"
          config:
            osdsPerDevice: "1"
          nodes:
            - name: infra1
              devices:
                - name: "/dev/disk/by-id/nvme-Samsung_SSD_990_PRO_4TB_S7KGNJ0X152103W-part3"
              resources:
                limits:
                  memory: 3Gi #   Default: 4Gi
                requests:
                  cpu: 750m #     Default: 1000m
                  memory: 750Mi # Default: 4Gi
            - name: infra2
              devices:
                - name: "/dev/disk/by-id/ata-Samsung_SSD_860_PRO_1TB_S45ENF0M201675D-part3"
            # - name: infra3
            #   devices:
            #     - name: "/dev/disk/by-id/ata-Samsung_SSD_850_PRO_256GB_S251NSAG548480W-part3"
            - name: infra5
              devices:
                - name: "/dev/disk/by-id/nvme-Samsung_SSD_990_PRO_2TB_S7KHNJ0WA17672P-part3"
            - name: infra6
              devices:
                - name: "/dev/disk/by-id/nvme-Samsung_SSD_990_PRO_2TB_S7KHNU0X415592A-part3"
            # - name: infra7
            #   devices:
            #     - name: "/dev/disk/by-id/ata-Samsung_SSD_850_PRO_1TB_S3D2NX0J201186E-part3"
            - name: infra8
              devices:
                - name: "/dev/disk/by-id/ata-Samsung_Portable_SSD_T5_S3UJNV0K408351K-part3"
        network:
          hostNetwork: true
        resources:
          # Reduce the memory consuption so that they fit on 4 CPUs and 8GB ram.
          mgr:
            limits:
              memory: 2560Mi
            requests:
              cpu: 500m #      Default: 500m
              memory: 512Mi #  Default: 512Mi
          mon:
            limits:
              memory: 1250Mi # Default: 2Gi
            requests:
              cpu: 750m #      Default: 1000m
              memory: 500Mi #  Default: 1Gi
          osd:
            limits:
              memory: 2Gi #    Default: 4Gi
            requests:
              cpu: 500m #      Default: 1000m
              memory: 1Gi #    Default: 4Gi

      # cephBlockPools:
      # See https://github.com/rook/rook/blob/master/Documentation/CRDs/Block-Storage/ceph-block-pool-crd.md#spec for available configuration
      cephBlockPoolsVolumeSnapshotClass:
        enabled: true
        annotations:
          velero.io/csi-volumesnapshot-class: "true"

      # cephFileSystems:
      # See https://github.com/rook/rook/blob/master/Documentation/CRDs/Shared-Filesystem/ceph-filesystem-crd.md#filesystem-settings for available configuration
      cephFileSystemVolumeSnapshotClass:
        enabled: true
        annotations:
          velero.io/csi-volumesnapshot-class: "true"

      # cephObjectStores:
      # See https://github.com/rook/rook/blob/master/Documentation/CRDs/Object-Storage/ceph-object-store-crd.md#object-store-settings for available configuration

patches:
  - patch: |-
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: ceph-block
      reclaimPolicy: Retain
  - patch: |-
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: ceph-bucket
      reclaimPolicy: Retain
      allowVolumeExpansion: true
  - patch: |-
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: ceph-filesystem
      reclaimPolicy: Retain
      allowVolumeExpansion: true
  - patch: |-
      apiVersion: ceph.rook.io/v1
      kind: CephObjectStore
      metadata:
        name: ceph-objectstore
        namespace: rook-ceph
      spec:
        gateway:
          resources:
            limits:
              memory: 512Mi # Default: 2Gi
            requests:
              cpu: 750m #     Default: 1000m
              memory: 256Mi # Default: 1Gi
  - patch: |-
      apiVersion: ceph.rook.io/v1
      kind: CephFilesystem
      metadata:
        name: ceph-filesystem
        namespace: rook-ceph
      spec:
        metadataServer:
          resources:
            limits:
              memory: 512Mi # Default: 4Gi
            requests:
              cpu: 500m #     Default: 1000m
              memory: 256Mi # Default: 4Gi
