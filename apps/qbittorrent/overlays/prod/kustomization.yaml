# From: https://github.com/truecharts/charts/blob/master/charts/stable/qbittorrent/values.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress-route.yaml
  - secrets/vpn-secret-enc.yaml

helmCharts:
  - name: qbittorrent
    repo: oci://oci.trueforge.org/truecharts
    releaseName: qbittorrent
    namespace: media
    version: 25.1.3
    includeCRDs: true
    valuesInline:
      TZ: America/Los_Angeles
      podOptions:
        defaultAffinity: false
        nodeSelector:
          kubernetes.io/arch: "arm64"
      persistence:
        config:
          enabled: true
          retain: true
          storageClass: ceph-block
          accessMode: ReadWriteOnce
          size: 1Gi
        data:
          enabled: true
          type: nfs
          path: /data
          server: infra1
          mountPath: /data
      gluetunImage:
        repository: ghcr.io/qdm12/gluetun
        tag: v3.41
        pullPolicy: IfNotPresent
      service:
        proxy:
          enabled: true
          ports:
            gluetun-proxy:
              enabled: true
              port: 8888
              protocol: "http"
              targetPort: 8888
          type: "ClusterIP"
      addons:
        gluetun:
          enabled: true
          container:
            env:
              DNS_KEEP_NAMESERVER: off
              VPN_SERVICE_PROVIDER: surfshark
              VPN_TYPE: wireguard
              FIREWALL: "on"
              FIREWALL_OUTBOUND_SUBNETS: "10.10.2.0/24"
              FIREWALL_INPUT_PORTS: 10095,8888,8000
              HTTPPROXY: "on"
              HTTPPROXY_LOG: "on"
              HTTPPROXY_LISTENING_ADDRESS: ":8888"
            envFrom:
              - secretRef:
                  name: vpn-secret
                  expandObjectName: false
