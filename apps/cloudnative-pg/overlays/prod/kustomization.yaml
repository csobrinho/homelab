# From https://github.com/cloudnative-pg/charts/blob/main/charts/cloudnative-pg/values.yaml
# yaml-language-server: $schema=https://www.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - cluster.yaml
  - secrets/dispatcharr-secret-enc.yaml

helmCharts:
  - name: cloudnative-pg
    repo: https://cloudnative-pg.github.io/charts
    releaseName: cloudnative-pg
    namespace: cnpg-system
    version: 0.28.3
    includeCRDs: true
    valuesFile: values.yaml