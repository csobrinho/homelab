apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Application
      labelSelector: "sablier.managed=true"
    patch: |-
      - op: add
        path: /spec/ignoreDifferences
        value:
          - group: apps
            kind: Deployment
            jsonPointers:
              - /spec/replicas
          - group: apps
            kind: StatefulSet
            jsonPointers:
              - /spec/replicas
