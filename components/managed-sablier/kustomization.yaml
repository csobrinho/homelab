apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - middleware.yaml

patches:
  - target:
      group: apps
      kind: Deployment
    patch: |-
      - op: remove
        path: /spec/replicas
  - target:
      group: apps
      kind: StatefulSet
    patch: |-
      - op: remove
        path: /spec/replicas
  - target:
      group: traefik.io
      version: v1alpha1
      kind: IngressRoute
    patch: |-
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: ignore
      spec:
        routes:
          - middlewares:
              - name: middleware-sablier

transformers:
  - transformer-labels.yaml
