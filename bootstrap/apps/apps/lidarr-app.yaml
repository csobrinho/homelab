apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lidarr
  namespace: argocd
  labels:
    sablier.managed: "true"
spec:
  destination:
    namespace: media
    name: in-cluster
  project: default
  source:
    path: apps/lidarr/overlays/prod
    repoURL: https://github.com/csobrinho/homelab
  ignoreDifferences: []
