apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mealie
  namespace: argocd
  labels:
    sablier.managed: "true"
spec:
  destination:
    namespace: mealie
    name: in-cluster
  project: default
  source:
    path: apps/mealie/overlays/prod
    repoURL: https://github.com/csobrinho/homelab
  ignoreDifferences: []
