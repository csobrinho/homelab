apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: go-playground
  namespace: argocd
  labels:
    sablier.managed: "true"
spec:
  destination:
    namespace: tools
    name: in-cluster
  project: default
  source:
    path: apps/go-playground/overlays/prod
    repoURL: https://github.com/csobrinho/homelab
  ignoreDifferences: []
